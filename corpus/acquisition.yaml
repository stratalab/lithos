# Acquisition specs — the per-id details seed_index.csv doesn't carry
# (HF include patterns, dump URLs, size estimates for planning).
# Executed by scripts/acquire/acquire.py on a throwaway VM (bulk bytes never
# transit the home connection); raw mirrors land at <R2>/raw/<id>/ with a
# provenance manifest per doctrine (doc §0.4). id keys must exist in
# corpus/seed_index.csv (enforced by the driver).

waves:
  p0:
    - openwebmath
    - finemath
    - nemotron-cc-math
    - megamath
    - proof-pile-2
    - fineweb-edu
    - stackexchange-dumps
  posttrain:
    - openmathreasoning
    - nemotron-math-v2
    - acereason-sft
    - open-swe-traces
  # Physics/eng wave — next ingestion priority, ahead of the code wave p1
  # (2026-07-04). Only pes2o has a runnable hf route today; the rest of the
  # physics/eng sources are indexed in corpus/seed_index.csv but need net-new
  # acquire.py routes (scrape / arxiv-src / lawful-copy / pd) plus the extractor
  # suite (PDF/LaTeX/HTML->text). See docs/physics-eng-ingestion.md.
  physeng:
    - pes2o
    - openstax
  # Code wave. Real-code source = The Stack v1 dedup STEM-language slice (raw GitHub
  # code, per-language, permissive-licensed) — NOT nemotron-pretraining-code-v2, which
  # is deferred (gated-manual + largely synthetic; see its spec). Split: small STEM
  # langs fit the current drive now; Python + notebooks are bulk (larger drive).
  p1:
    - the-stack-stem-small
    - the-stack-stem-python
    - nemotron-cc-code
    - mathpile

specs:
  openwebmath:
    route: hf
    repo: open-web-math/open-web-math
    est_gb: 27
  finemath:
    route: hf
    repo: HuggingFaceTB/finemath
    include: ["finemath-3plus/*"] # 4plus is the higher-scored subset of 3plus
    est_gb: 80
  nemotron-cc-math:
    route: hf
    repo: nvidia/Nemotron-CC-Math-v1
    est_gb: 270
    notes: access approved (stratalab); 270GB bulk — DEFERRED to the larger /data drive
  megamath:
    route: hf
    repo: LLM360/MegaMath
    include: ["megamath-web/*", "megamath-code/*"] # synthetic subset deferred (generator unnamed)
    est_gb: 600
  proof-pile-2:
    route: hf
    repo: EleutherAI/proof-pile-2
    est_gb: 100
  fineweb-edu:
    route: hf
    repo: HuggingFaceFW/fineweb-edu
    include: ["sample/100BT/*"] # glue budget is 150B; the 1.3T full set stays remote
    est_gb: 220
  stackexchange-dumps:
    # Historical archive.org dumps (pre login-wall, clean CC-BY-SA) — see doc §2.2.
    # aria2c resumes; sites chosen per seed_index qa rows.
    route: dump
    urls:
      - https://archive.org/download/stackexchange/stackoverflow.com-Posts.7z
      - https://archive.org/download/stackexchange/stackoverflow.com-Comments.7z
      - https://archive.org/download/stackexchange/math.stackexchange.com.7z
      - https://archive.org/download/stackexchange/mathoverflow.net.7z
      - https://archive.org/download/stackexchange/physics.stackexchange.com.7z
      - https://archive.org/download/stackexchange/electronics.stackexchange.com.7z
      - https://archive.org/download/stackexchange/stats.stackexchange.com.7z
      - https://archive.org/download/stackexchange/scicomp.stackexchange.com.7z
      - https://archive.org/download/stackexchange/cstheory.stackexchange.com.7z
    est_gb: 110
    index_ids: [stackoverflow, math-se-mo, physics-se, electronics-se, scicomp-stats-se]
  openmathreasoning:
    route: hf
    repo: nvidia/OpenMathReasoning
    est_gb: 150
    index_ids: [] # post-training set - lives in doc §2.2, not the pretrain index
  nemotron-math-v2:
    route: hf
    repo: nvidia/Nemotron-Math-v2
    est_gb: 143
    index_ids: []
  acereason-sft:
    route: hf
    repo: nvidia/AceReason-1.1-SFT
    est_gb: 60
    index_ids: []
  open-swe-traces:
    route: hf
    repo: nvidia/Open-SWE-Traces
    est_gb: 18
    index_ids: []
  nemotron-pretraining-code-v2:
    route: hf
    repo: nvidia/Nemotron-Pretraining-Code-v2
    est_gb: 650
    # DEFERRED — superseded by the-stack-stem for real code. This one is gated-manual
    # AND largely synthetic (Synthetic-QA/Review/Rewriting/Transpilation configs, not
    # raw code) AND not language-partitioned. Revisit later as code-REASONING data for
    # the SFT/RLVR track, filtered by its language field. Not in a wave.
    notes: DEFERRED — superseded by the-stack-stem (real code > synthetic); gated-manual
  # Real GitHub code (the StarCoder v1 source), per-language dirs, permissive-licensed
  # + secret-scanned. Split by size so the small STEM langs land on the current drive.
  # GATE: bigcode/the-stack-dedup needs its access terms accepted once on the
  # stratalab account (https://huggingface.co/datasets/bigcode/the-stack-dedup —
  # "Agree and access"; auto-approved, instant). Metadata reads without it; content
  # download does not.
  the-stack-stem-small:
    route: hf
    repo: bigcode/the-stack-dedup
    include:
      - "data/r/*"
      - "data/matlab/*"
      - "data/julia/*"
      - "data/fortran/*"
    est_gb: 20
    index_ids: [the-stack-stem]
    notes: small STEM langs (R/MATLAB/Julia/Fortran) — fits the current drive now
  the-stack-stem-python:
    route: hf
    repo: bigcode/the-stack-dedup
    include:
      - "data/python/*"
      - "data/jupyter-notebook/*"
    est_gb: 350
    index_ids: [the-stack-stem]
    notes: DEFERRED — Python (144 shards) + notebooks (312); larger drive + scientific-import filter
  nemotron-cc-code:
    route: hf
    repo: nvidia/Nemotron-CC-Code-v1
    est_gb: 40
    notes: GATED - awaiting approved access on the stratalab account
  pes2o:
    route: hf
    repo: allenai/peS2o
    # ~40M full-text papers — the real footprint is ~280 GB, NOT 80 GB. It filled
    # the current /data on 2026-07-04 (763 GB drive). DEFERRED until the larger
    # /data drive is installed; then pull locally. Same hold applies to the other
    # bulk sources (megamath ~600 GB, nemotron-cc-math ~270 GB, Stack v2).
    est_gb: 280
    notes: DEFERRED — needs the larger /data drive (being installed); too big for the current drive
  openstax:
    # physics/chem/math CC-BY textbooks: GitHub osbooks-* tarballs (pinned to the
    # approved commit) -> CNXML -> EX-1 (lithos/data/markup_text). Output is
    # canonical .jsonl.zst directly (scrape fetch+extract are coupled).
    route: scrape
    handler: openstax
    est_gb: 1
    notes: CC-BY; math preserved as LaTeX; no eng texts (grey canon covers those)
  mathpile:
    route: hf
    repo: GAIR/MathPile
    est_gb: 20
    notes: research license - verify terms before any keeper run (index row says mixed)
