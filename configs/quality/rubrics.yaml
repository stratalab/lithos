# Per-domain quality rubrics (docs/quality-classifiers.md §2).
# version bumps whenever wording changes — labels are only comparable within
# a rubric version (recorded per label). Iterate ONCE after the pilot, then freeze.

version: 1

response_format: |
  Respond with exactly two lines:
  SCORE: <integer 0-5>
  WHY: <one short sentence>

domains:
  physics-eng:
    name: Technical training value (physics / engineering)
    rubric: |
      Score this document 0-5 for its value as physics/engineering training
      text. The axis is QUANTITATIVE SUBSTANCE, not topic: prose *about* a
      technical subject without quantitative content scores low.

      0 - No technical content: spam, boilerplate, navigation, ads.
      1 - Mentions technical topics without substance: news blurbs, product
          marketing, course listings, link collections.
      2 - Descriptive or popular explanation: correct but purely qualitative -
          no equations, no numbers with units, no derivations.
      3 - Substantive technical exposition with SOME quantitative content
          (equations, numbers with units, or code), but fragmentary, shallow,
          or poorly organized.
      4 - Solid technical material: derivations, worked examples, or design
          reasoning with quantities and units; coherent and self-contained.
      5 - Textbook or reference grade: rigorous derivations, worked problems,
          precise units, pedagogically complete treatment.
  code:
    name: Educational value (code + prose documents)
    rubric: |
      Score this document 0-5 for its value as code training text. It has
      already passed mechanical filters (parses, not minified/generated), so
      judge whether the code TEACHES.

      0 - Not really code: config dumps, data blobs, auto-generated listings.
      1 - Code without context: uncommented snippets, no prose, unclear intent.
      2 - Working but opaque: runnable code, poor names, no explanation of why.
      3 - Decent: readable code with some comments or surrounding prose; a
          reader could learn the pattern with effort.
      4 - Instructive: clear names, comments explaining intent, prose
          interleaved with working code (good tutorial, answered question,
          well-documented module).
      5 - Exemplary teaching material: complete worked example with rationale,
          edge cases discussed, idiomatic style worth imitating.
  math:
    name: Reasoning density (mathematics)
    rubric: |
      Score this document 0-5 for mathematical reasoning density. The axis is
      WORKED REASONING, not formula presence: naming a theorem scores low;
      deriving it scores high.

      0 - No mathematical content.
      1 - Mentions mathematical topics or drops formula names without using them.
      2 - States formulas or results without derivation or application.
      3 - Some worked steps: partial derivations, applied formulas with
          numbers, or proof sketches; incomplete or fragmentary.
      4 - Substantial worked reasoning: complete derivations, worked problems
          with steps shown, or full proofs at moderate depth.
      5 - Dense rigorous reasoning throughout: complete proofs or multi-step
          worked solutions with justification at each step.

# xdomain documents (notebooks, physics-via-code): score with physics-eng AND
# the code executable tier (stage-3.5 mechanical gate); both must clear.
