# Corpus for the 100M run (seq 2048), built from the Nemotron pretraining sample.
name: lithos-nemotron-100m
version: v0.1
tokenizer_path: artifacts/tokenizer/nemotron-32k/tokenizer.json

sources:
  - kind: jsonl
    paths: ["data/nemotron-sample/raw/hq_synthetic.jsonl"]
    source_name: nemotron-cc-hq-synthetic
    tier: open
    language: en
    license: nvidia-open-data
  - kind: jsonl
    paths: ["data/nemotron-sample/raw/hq.jsonl"]
    source_name: nemotron-cc-hq
    tier: open
    language: en
    license: nvidia-open-data
  - kind: jsonl
    paths: ["data/nemotron-sample/raw/diverse_qa.jsonl"]
    source_name: nemotron-cc-diverse-qa
    tier: open
    language: en
    license: nvidia-open-data
  - kind: jsonl
    paths: ["data/nemotron-sample/raw/math.jsonl"]
    source_name: nemotron-cc-math
    tier: open
    language: en
    license: nvidia-open-data
  - kind: jsonl
    paths: ["data/nemotron-sample/raw/synth_code.jsonl"]
    source_name: nemotron-synthetic-code
    tier: open
    language: en
    license: nvidia-open-data

output_dir: data/nemotron-sample/corpus-100m-v0.1
seq_len: 2048
tokens_per_shard: 2000000
add_bos: true
add_eos: true
exact_dedup: true


license_notes:
  - "nvidia/Nemotron-Pretraining-Dataset-sample (NVIDIA Open Data License)."
  - "Includes model-generated synthetic + code (Qwen/DeepSeek terms on distribution)."
