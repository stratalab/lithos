# TIR-GRPO test bench (E4): multi-segment tool-use rollouts scored by the E1
# verifier — reason → call Python in the sandbox → use the result → answer.
# Tasks are checkable numeric compute (the tool does the arithmetic).
#
# NOTE: requires a tokenizer carrying the TIR tokens (reserved block, IDs 7-15 of
# the STEM tokenizer — docs/tir-format.md §2). Today's fineweb-edu-32k lacks them,
# so this config is the recipe; it runs once the STEM tokenizer is frozen (or on a
# tokenizer with the TIR tokens added). The model's vocab_size must match.
run_name: lithos-tir-toy-grpo
seed: 0
device: auto
precision: bf16

init_from: runs/<sft-checkpoint>/checkpoints/step_XXXXXX   # SFT-first, then RLVR

micro_batch_size: 4         # prompts per step (P)
grpo_group_size: 8          # rollouts per prompt (the group baseline, G)
grpo_temperature: 1.0
grpo_kl_coef: 0.05

grpo_tir: true
grpo_task_bank: configs/grpo/tir-toy-tasks.jsonl
grpo_max_new: 256           # token budget per episode (reasoning + tool calls + answer)
grpo_max_tool_calls: 2
grpo_tool_timeout_s: 5.0
grpo_result_token_cap: 128

log_interval: 5
checkpoint_interval: 0

model:                      # MUST match the base checkpoint + the TIR tokenizer's vocab
  vocab_size: 32016         # 32000 STEM vocab (TIR tokens live in the reserved block)
  n_layers: 12
  hidden: 768
  n_heads: 12
  n_kv_heads: 12
  intermediate_size: 2048
  seq_len: 2048
  rope_theta: 10000.0
  qk_norm: true
  tie_embeddings: true

data:
  kind: grpo
  tokenizer_path: artifacts/tokenizer/stem-32k/tokenizer.json   # the TIR-carrying tokenizer
  corpus_manifest: unused   # GRPO generates its own rollouts; tasks come from grpo_task_bank
  seq_len: 2048

optim:
  lr: 0.000001              # 1e-6 — RL is sensitive
  betas: [0.9, 0.95]
  weight_decay: 0.0
  grad_clip: 1.0

schedule:
  warmup_steps: 10
  max_steps: 200
  min_lr_ratio: 0.5

wandb:
  enabled: false
