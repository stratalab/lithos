# Wikipedia topic-graph job — per-domain seed pages (docs/data-construction.md §1.7).
#
# Seeds are pre-made curation: "Outline of X" pages, "List of important
# publications", glossaries, and core subject roots. PPR expands from these
# over the full link graph; the per-domain result is the topic family.
# Titles use spaces (redirects resolve automatically).

alpha: 0.85
max_iter: 40
top_n: 60000 # default family size; per-domain override below

domains:
  math:
    top_n: 80000
    seeds:
      - Mathematics
      - Outline of mathematics
      - Lists of mathematics topics
      - List of important publications in mathematics
      - Glossary of areas of mathematics
      - Mathematical analysis
      - Abstract algebra
      - Linear algebra
      - Topology
      - Differential geometry
      - Number theory
      - Combinatorics
      - Probability theory
      - Mathematical statistics
      - Mathematical optimization
      - Numerical analysis
      - Partial differential equation
      - Dynamical system
      - Mathematical logic
      - Category theory
      - Information theory
