# Small real-data smoke run on the Nemotron pretraining sample (~17M params).
run_name: lithos-nemotron-sample
seed: 0
device: auto
precision: bf16

micro_batch_size: 16
gradient_accumulation_steps: 1
log_interval: 20
eval_interval: 0
checkpoint_interval: 300

model:
  vocab_size: 16384   # overridden at runtime to the exact trained tokenizer vocab
  n_layers: 6
  hidden: 384
  n_heads: 6
  n_kv_heads: 6
  seq_len: 512
  qk_norm: false

data:
  corpus_manifest: data/nemotron-sample/corpus-v0.1/corpus_manifest.json
  seq_len: 512

optim:
  lr: 0.0006
  weight_decay: 0.1
  grad_clip: 1.0

schedule:
  warmup_steps: 30
  max_steps: 300
  min_lr_ratio: 0.1
