# Small, fast proxy model for data-recipe ablations (Phase 10).
# The ablation harness overrides data.corpus_manifest / run_name / runs_dir per variant, so
# only the data recipe varies. vocab matches the FineWeb-Edu 32k tokenizer. This is a *signal*
# proxy, not a keeper — scale model/steps up for a sharper read.
run_name: ablation-proxy
seed: 0
device: auto
precision: bf16

micro_batch_size: 16
gradient_accumulation_steps: 1
grad_checkpointing: false

log_interval: 20

model:
  vocab_size: 32000
  n_layers: 6
  hidden: 384
  n_heads: 6
  n_kv_heads: 6
  intermediate_size: 1024
  seq_len: 512
  qk_norm: true
  tie_embeddings: true

data:
  corpus_manifest: set-by-ablation-harness   # placeholder; overridden per variant
  seq_len: 512

optim:
  lr: 0.0008
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0

schedule:
  warmup_steps: 50
  max_steps: 1000
  min_lr_ratio: 0.1

wandb:
  enabled: false
