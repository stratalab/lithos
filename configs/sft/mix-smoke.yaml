# Smoke build of a packed multi-source SFT corpus (epic E2).
# Blends the Dolly general backbone with a small upsampled "gems" set, capping the
# giant source and repeating the tiny one (the LIMA-in-reverse guard). Produces
# dual-stream shards (tokens + loss mask) + an SFT manifest that records the mix.
#
#   python scripts/build_sft_corpus.py --config configs/sft/mix-smoke.yaml
name: lithos-sft-smoke
version: v0.1
tokenizer_path: artifacts/tokenizer/fineweb-edu-32k/tokenizer.json
output_dir: data/sft/mix-smoke-v0.1
seq_len: 1024
tokens_per_shard: 500000
add_bos: true
seed: 0
val_fraction: 0.02
# decontam_probes: data/decontam/battery_probes.jsonl   # F2 screen (uncomment when built)

sources:
  - path: data/sft/dolly/train.jsonl
    name: dolly-general
    max_examples: 10000        # cap the giant general set
    repeats: 1
  - path: data/sft/dolly/val.jsonl
    name: gems-upsampled       # stand-in "small excellent" set for the smoke build
    max_examples: 500
    repeats: 3                 # upsample the gems so they aren't drowned
