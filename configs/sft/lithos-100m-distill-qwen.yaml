# Distillation-as-SFT (Phase 11): SFT the BASE 100M on Qwen2.5-1.5B-Instruct's answers
# to Dolly prompts. Init from the base (same as the Dolly-human SFT) so the two are a
# clean A/B: base -> SFT-on-distilled-answers vs base -> SFT-on-human-answers. The
# *prompts* are identical; only the answer source (Qwen teacher vs Dolly human) differs.
run_name: lithos-100m-sft-distill-qwen
seed: 0
device: auto
precision: bf16

init_from: models/lithos-100m-v0.1/checkpoint   # the BASE 100M (not the Dolly-SFT'd one)

micro_batch_size: 4
gradient_accumulation_steps: 8    # effective batch 32
grad_checkpointing: false
compile: false

log_interval: 10
eval_interval: 40
checkpoint_interval: 0

model:                            # identical architecture to the base 100M
  vocab_size: 32000
  n_layers: 12
  hidden: 768
  n_heads: 12
  n_kv_heads: 12
  intermediate_size: 2048
  seq_len: 2048
  rope_theta: 10000.0
  qk_norm: true
  tie_embeddings: true

data:
  kind: sft
  tokenizer_path: artifacts/tokenizer/fineweb-edu-32k/tokenizer.json
  corpus_manifest: data/distill/qwen_dolly/train.jsonl   # the teacher's answers
  val_corpus_manifest: data/distill/qwen_dolly/val.jsonl
  seq_len: 1024

optim:
  lr: 0.00002                     # 2e-5 — same as the Dolly SFT
  betas: [0.9, 0.95]
  weight_decay: 0.0
  grad_clip: 1.0

schedule:
  warmup_steps: 15
  max_steps: 180                  # ~3 epochs over ~1.9k examples at effective batch 32
  min_lr_ratio: 0.1

wandb:
  enabled: false
