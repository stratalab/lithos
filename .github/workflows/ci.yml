name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # CPU torch keeps CI fast; unit/shape tests don't need a GPU (PRD §26.1).
      - name: Sync dependencies
        run: uv sync
        env:
          UV_TORCH_BACKEND: cpu

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest
